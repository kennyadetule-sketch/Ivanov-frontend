  <!-- FORM AREA -->
  <div class="service-wrapper">

    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="Phone Number">
    <input type="text" id="address" placeholder="Service Address">
    <input type="text" id="budget" placeholder=" e.g £1,000">
    <textarea id="description" placeholder="Briefly describe your request" rows="4"></textarea>

    <!-- BONUS BUTTON -->
    <button id="bonusBtn" class="btn" onclick="applyBonus()">
      Apply 20% Bonus
    </button>
<script>
  if (localStorage.getItem("bonusUsed") === "true") {
    document.getElementById("bonusBtn").disabled = true;
  }
</script>


    <!-- SUBMIT -->
    <button id="submitBtn" class="btn" onclick="submitRequest('kitchen_bathroom', event)">
  Submit Request
</button>
